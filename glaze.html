<html lang="en">

<body>
    <header>
        <nav>
            <a href="index.html">About me</a>

    <main class="timeline-page">
        <section class="timeline-hero">
            <h1>Achievements Timeline</h1>
            <p class="hero-text">
                A timeline of competitions, awards, invitations, publications, and a few
                side quests. Click any card to open the relevant competition or event site.
            </p>
        </section>

        <div class="divider"></div>

        <section class="timeline-controls">
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="informatics">Informatics</button>
                <button class="filter-btn" data-filter="cybersecurity">Cybersecurity</button>
                <button class="filter-btn" data-filter="robotics">Robotics</button>
                <button class="filter-btn" data-filter="math">Math</button>
                <button class="filter-btn" data-filter="coding">Coding</button>
                <button class="filter-btn" data-filter="research">Research</button>
                <button class="filter-btn" data-filter="project">Projects</button>
            </div>

            <div class="timeline-summary">
                <span id="results-count">0 items</span>
            </div>
        </section>

        <section id="timeline" class="timeline"></section>
    </main>

    <script src="glaze.js"></script>
